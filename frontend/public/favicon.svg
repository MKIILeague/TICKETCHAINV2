<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="tcTicket" x1="120" y1="150" x2="392" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#b16bff"/>
      <stop offset=".5" stop-color="#8b3bff"/>
      <stop offset="1" stop-color="#6a1fd6"/>
    </linearGradient>
    <linearGradient id="tcChain" x1="150" y1="300" x2="250" y2="212" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#37b6ff"/>
      <stop offset="1" stop-color="#7fe4ff"/>
    </linearGradient>
    <mask id="tcNotch">
      <rect x="112" y="184" width="288" height="144" rx="26" fill="#fff"/>
      <circle cx="324" cy="184" r="17" fill="#000"/>
      <circle cx="324" cy="328" r="17" fill="#000"/>
    </mask>
  </defs>
  <g transform="rotate(-12 256 256)">
    <!-- ticket body -->
    <rect x="112" y="184" width="288" height="144" rx="26" fill="url(#tcTicket)" mask="url(#tcNotch)"/>
    <!-- soft top sheen -->
    <rect x="112" y="184" width="288" height="54" rx="26" fill="#ffffff" opacity=".10" mask="url(#tcNotch)"/>
    <!-- perforation between stub and body -->
    <line x1="324" y1="206" x2="324" y2="306" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-dasharray="1 17" opacity=".85"/>
    <!-- interlocked chain links -->
    <g stroke="url(#tcChain)" stroke-width="20" fill="none" stroke-linecap="round">
      <rect x="130" y="248" width="104" height="46" rx="23" transform="rotate(-38 182 271)"/>
      <rect x="163" y="222" width="104" height="46" rx="23" transform="rotate(-38 215 245)"/>
    </g>
  </g>
</svg>
